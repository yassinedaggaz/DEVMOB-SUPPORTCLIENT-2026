name: devmob_supportclient
description: "Application de support client / ticketing - DEVMOB SUPPORTCLIENT"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # Firebase
  firebase_core: ^3.13.0
  firebase_auth: ^5.5.2
  cloud_firestore: ^5.6.6
  firebase_storage: ^12.4.5

  # State management
  provider: ^6.1.2

  # Navigation
  go_router: ^14.8.1

  # HTTP & API
  dio: ^5.8.0+1
  http: ^1.3.0

  # File upload
  image_picker: ^1.1.2
  file_picker: ^8.3.7

  # UI
  flutter_slidable: ^3.1.1
  badges: ^3.1.2
  shimmer: ^3.0.0
  cached_network_image: ^3.4.1

  # Utils
  intl: ^0.20.2
  uuid: ^4.5.1
  shared_preferences: ^2.5.2
  path_provider: ^2.1.5
  fl_chart: ^1.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
